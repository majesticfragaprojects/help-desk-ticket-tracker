{% extends "base.html" %}

{% block title %}Edit Ticket #{{ ticket.id }} • Help Desk Ticket Tracker{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit Ticket #{{ ticket.id }}</h1>
    <p class="subtitle">{{ ticket.title }}</p>
</div>

<div class="form-container">
    <form method="post" action="{{ url_for('edit_ticket', ticket_id=ticket.id) }}" class="ticket-form">
        <div class="form-group">
            <label for="title">Ticket Title <span class="required">*</span></label>
            <input type="text" 
                   id="title" 
                   name="title" 
                   value="{{ ticket.title }}" 
                   required>
        </div>

        <div class="form-group">
            <label for="description">Description <span class="required">*</span></label>
            <textarea id="description" 
                      name="description" 
                      rows="6" 
                      required>{{ ticket.description }}</textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="priority">Priority <span class="required">*</span></label>
                <select id="priority" name="priority" required>
                    {% for p in allowed_priorities %}
                        <option value="{{ p }}" {% if ticket.priority == p %}selected{% endif %}>
                            {{ p }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="category">Category <span class="required">*</span></label>
                <select id="category" name="category" required>
                    {% for c in allowed_categories %}
                        <option value="{{ c }}" {% if ticket.category == c %}selected{% endif %}>
                            {{ c }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="status">Status <span class="required">*</span></label>
                <select id="status" name="status" required>
                    {% for s in allowed_statuses %}
                        <option value="{{ s }}" {% if ticket.status == s %}selected{% endif %}>
                            {{ s }}
                        </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('ticket_details', ticket_id=ticket.id) }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
